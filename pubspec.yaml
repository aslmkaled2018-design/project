name: project
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  dotted_border: ^2.0.0
  provider: ^6.1.2
  image_picker: ^1.0.0
  cupertino_icons: ^1.0.8
  tflite_flutter: ^0.12.0
  image: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/leaf_validator.tflite
    - assets/disease_classifier.tflite

  fonts:
    - family: poppins
      fonts:
        - asset: fonts/Poppins-ThinItalic.ttf
          style: italic
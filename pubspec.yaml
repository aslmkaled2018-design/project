name: project
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  easy_localization: ^3.0.8
  dotted_border: ^2.0.0
  provider: ^6.1.2
  image_picker: ^1.0.0
  cupertino_icons: ^1.0.8
  dio: ^5.4.0
  shared_preferences: ^2.2.3
  tflite_flutter: 0.12.1
  image: ^4.1.3
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  uuid: ^4.5.3
  connectivity_plus: ^7.1.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  

flutter:
  uses-material-design: true

  assets:
    - assets/leaf_validator.tflite
    - assets/disease_classifier.tflite
    - images/plan1.png
    - images/plan2.jpg
    - images/plan3.jpg
    - assets/translations/ar.json
    - assets/translations/en.json

  fonts:
    - family: poppins
      fonts:
        - asset: fonts/Poppins-ThinItalic.ttf
          style: italic